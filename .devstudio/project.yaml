schema: 1
project:
  name: DiscogsClient
  kind: dotnet-library
  owner: lancer1977
  languages:
    - csharp
  frameworks:
    - dotnet
    - xunit

validation:
  validate: bash scripts/validate.sh
  scope:
    - Restore, release test, and package generation for PolyhydraGames.DiscogsClient.
    - Secret-free deterministic tests by default; live Discogs API tests remain opt-in.

ci:
  build:
    - dotnet pack DiscogsClient/PolyhydraGames.Discogs.csproj --configuration Release --no-restore --output artifacts/packages
  test:
    - bash scripts/validate.sh

tracking:
  primary: local-00-agile
  dev-studio: DEV_STUDIO.md

docs:
  index: docs/README.md
  validation: docs/validation.md
  features: docs/features/README.md
  roadmap: docs/roadmaps/README.md

devstudio:
  runtime_model: three-agent
  backlog_ordering: filename
  skip_promoted_planning: true
  one_stage_per_run: true
